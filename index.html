<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이천시 실시간 날씨</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background: linear-gradient(135deg, #7dd3fc, #fde68a);
      color: #1f2937;
    }

    .card {
      width: 100%;
      max-width: 440px;
      padding: 30px 24px;
      border-radius: 28px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 18px 45px rgba(0,0,0,0.18);
      text-align: center;
    }

    .location { color: #64748b; font-size: 14px; margin-bottom: 8px; }
    h1 { margin-bottom: 18px; }
    .emoji { font-size: 78px; margin-bottom: 10px; }
    .weather-text { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    .temp { font-size: 50px; font-weight: 800; color: #f97316; margin-bottom: 20px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .box {
      padding: 14px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .box span {
      display: block;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .box strong { font-size: 18px; }

    .dust-good { color: #2563eb; }
    .dust-normal { color: #16a34a; }
    .dust-bad { color: #f97316; }
    .dust-very-bad { color: #dc2626; }

    .time {
      margin-top: 18px;
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      border: none;
      border-radius: 999px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    .error {
      display: none;
      margin-top: 14px;
      color: #dc2626;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <p class="location">경기도 이천시 · X 68, Y 121</p>
    <h1>실시간 날씨</h1>

    <div class="emoji" id="emoji">⏳</div>
    <div class="weather-text" id="weatherText">불러오는 중...</div>
    <div class="temp" id="temp">--°C</div>

    <div class="grid">
      <div class="box">
        <span>습도</span>
        <strong id="humidity">--%</strong>
      </div>
      <div class="box">
        <span>강수량</span>
        <strong id="rain">--</strong>
      </div>
      <div class="box">
        <span>풍속</span>
        <strong id="wind">-- m/s</strong>
      </div>
      <div class="box">
        <span>강수형태</span>
        <strong id="pty">--</strong>
      </div>
      <div class="box">
        <span>미세먼지 PM10</span>
        <strong id="pm10">--</strong>
      </div>
      <div class="box">
        <span>초미세먼지 PM2.5</span>
        <strong id="pm25">--</strong>
      </div>
    </div>

    <p class="time" id="timeInfo">조회 시각: --</p>
    <button onclick="loadAll()">새로고침</button>
    <p class="error" id="errorBox"></p>
  </div>

  <script>
    const SERVICE_KEY = "OaRLlfpKOXJH%2BFeghkAojoaSAQbb1bkFF9COvGfjixpiLkEYTHFLqIcBYqFb0HCrcX8H3A47X9QNiRpgcCXAOA%3D%3D";

    const WEATHER_URL =
      "https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst";

    const DUST_URL =
      "https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getCtprvnRltmMesureDnsty";

    const NX = 68;
    const NY = 121;

    function getBaseDateTime() {
      const now = new Date();
      const baseDate = new Date(now);
      let hour = now.getHours();

      if (now.getMinutes() < 40) {
        hour--;
        if (hour < 0) {
          hour = 23;
          baseDate.setDate(baseDate.getDate() - 1);
        }
      }

      const yyyy = baseDate.getFullYear();
      const mm = String(baseDate.getMonth() + 1).padStart(2, "0");
      const dd = String(baseDate.getDate()).padStart(2, "0");

      return {
        base_date: `${yyyy}${mm}${dd}`,
        base_time: `${String(hour).padStart(2, "0")}00`
      };
    }

    function weatherApiUrl() {
      const { base_date, base_time } = getBaseDateTime();

      return `${WEATHER_URL}?serviceKey=${SERVICE_KEY}&pageNo=1&numOfRows=1000&dataType=JSON&base_date=${base_date}&base_time=${base_time}&nx=${NX}&ny=${NY}`;
    }

    function dustApiUrl() {
      return `${DUST_URL}?serviceKey=${SERVICE_KEY}&returnType=json&numOfRows=100&pageNo=1&sidoName=경기&ver=1.0`;
    }

    function getPtyName(pty) {
      const map = {
        "0": "없음",
        "1": "비",
        "2": "비/눈",
        "3": "눈",
        "5": "빗방울",
        "6": "비/눈날림",
        "7": "눈날림"
      };
      return map[pty] || "알 수 없음";
    }

    function getWeatherInfo(pty) {
      const map = {
        "0": { text: "현재 강수는 없습니다", emoji: "☀️" },
        "1": { text: "비가 내리고 있습니다", emoji: "🌧️" },
        "2": { text: "비 또는 눈이 내립니다", emoji: "🌨️" },
        "3": { text: "눈이 내리고 있습니다", emoji: "❄️" },
        "5": { text: "빗방울이 떨어집니다", emoji: "🌦️" },
        "6": { text: "비 또는 눈날림이 있습니다", emoji: "🌨️" },
        "7": { text: "눈날림이 있습니다", emoji: "🌨️" }
      };
      return map[pty] || { text: "현재 날씨 정보입니다", emoji: "🌤️" };
    }

    function dustGrade(value, type) {
      const v = Number(value);
      if (isNaN(v)) return { text: "--", className: "" };

      if (type === "pm10") {
        if (v <= 30) return { text: "좋음", className: "dust-good" };
        if (v <= 80) return { text: "보통", className: "dust-normal" };
        if (v <= 150) return { text: "나쁨", className: "dust-bad" };
        return { text: "매우나쁨", className: "dust-very-bad" };
      }

      if (v <= 15) return { text: "좋음", className: "dust-good" };
      if (v <= 35) return { text: "보통", className: "dust-normal" };
      if (v <= 75) return { text: "나쁨", className: "dust-bad" };
      return { text: "매우나쁨", className: "dust-very-bad" };
    }

    async function loadWeather() {
      const res = await fetch(weatherApiUrl());
      const data = await res.json();

      const items = data.response.body.items.item;
      const weather = {};

      items.forEach(item => {
        weather[item.category] = item.obsrValue;
      });

      const temp = weather.T1H ?? "--";
      const humidity = weather.REH ?? "--";
      const rain = weather.RN1 ?? "0";
      const wind = weather.WSD ?? "--";
      const pty = weather.PTY ?? "0";
      const info = getWeatherInfo(pty);

      document.getElementById("emoji").textContent = info.emoji;
      document.getElementById("weatherText").textContent = info.text;
      document.getElementById("temp").textContent = `${temp}°C`;
      document.getElementById("humidity").textContent = `${humidity}%`;
      document.getElementById("rain").textContent =
        rain === "0" || rain === "강수없음" ? "없음" : `${rain}mm`;
      document.getElementById("wind").textContent = `${wind} m/s`;
      document.getElementById("pty").textContent = getPtyName(pty);
    }

    async function loadDust() {
      const res = await fetch(dustApiUrl());
      const data = await res.json();

      const items = data.response.body.items;

      const icheon =
        items.find(item => item.stationName.includes("이천")) || items[0];

      const pm10Value = icheon.pm10Value;
      const pm25Value = icheon.pm25Value;

      const pm10Grade = dustGrade(pm10Value, "pm10");
      const pm25Grade = dustGrade(pm25Value, "pm25");

      const pm10El = document.getElementById("pm10");
      const pm25El = document.getElementById("pm25");

      pm10El.textContent = `${pm10Value}㎍/㎥ · ${pm10Grade.text}`;
      pm10El.className = pm10Grade.className;

      pm25El.textContent = `${pm25Value}㎍/㎥ · ${pm25Grade.text}`;
      pm25El.className = pm25Grade.className;
    }

    async function loadAll() {
      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = "none";
      errorBox.textContent = "";

      document.getElementById("emoji").textContent = "⏳";
      document.getElementById("weatherText").textContent = "불러오는 중...";

      try {
        await Promise.all([
          loadWeather(),
          loadDust()
        ]);

        document.getElementById("timeInfo").innerHTML =
          `조회 시각: ${new Date().toLocaleString("ko-KR")}`;

      } catch (error) {
        document.getElementById("emoji").textContent = "⚠️";
        document.getElementById("weatherText").textContent = "정보를 불러오지 못했습니다.";
        errorBox.style.display = "block";
        errorBox.textContent =
          "API 호출 실패: 인증키, CORS, 에어코리아 API 활용신청 여부를 확인해주세요.";
        console.error(error);
      }
    }

    loadAll();
    setInterval(loadAll, 10 * 60 * 1000);
  </script>
</body>
</html>
